on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JBR
        uses: actions/setup-java@v4
        with:
          distribution: "jetbrains"
          java-package: "jdk"
          java-version: "25"
          check-latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ubuntu-latest-gradle

      - name: Gradle
        run: ./gradlew
        shell: bash

      - name: Build APK for CI (unsigned)
        shell: bash
        run: ./gradlew createReleaseFolderForCi
        env:
          SKIP_DESKTOP_BUILD: "true"
          SKIP_ANDROID_SIGNING: "true"

      - name: Upload APK to artifacts
        uses: actions/upload-artifact@v4
        with:
          path: ./build/ci-release
          name: apk-release

  release:
    runs-on: ubuntu-latest
    needs: [build-android]
    steps:
      - uses: actions/download-artifact@v4
        name: Download APK artifact
        with:
          path: release
          name: apk-release

      - name: "Show the output tree of release"
        run: tree .

      - uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          make_latest: legacy
          draft: true
          files: |
            release/binaries/*
